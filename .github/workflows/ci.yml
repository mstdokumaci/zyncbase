name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Run tests
        run: zig build test --summary all

  test-with-thread-sanitizer:
    name: Test with ThreadSanitizer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Run tests with ThreadSanitizer
        run: zig build test -Dsanitize=thread --summary all
        continue-on-error: true
        env:
          TSAN_OPTIONS: second_deadlock_stack=1:history_size=7

  memory-leak-check:
    name: Memory Leak Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Run tests with GPA leak detection
        run: zig build test --summary all

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Build
        run: zig build

      - name: Build with optimizations
        run: zig build -Doptimize=ReleaseFast
