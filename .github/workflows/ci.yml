name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test (${{ matrix.optimize }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        optimize: [ReleaseSafe, ReleaseFast]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Run tests
        run: zig build test -Doptimize=${{ matrix.optimize }} -Dcpu=x86_64_v2 --summary all

  test-sanitized:
    name: Test with ThreadSanitizer
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Run tests with ThreadSanitizer
        run: zig build test -Dsanitize=thread --summary all
        env:
          TSAN_OPTIONS: second_deadlock_stack=1:history_size=7

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Check TypeScript formatting and lint
        run: bunx biome check --write

      - name: Test TypeScript SDK
        run: bun test sdk

      - name: Build TypeScript SDK
        run: bun run --filter @zyncbase/client build

      - name: Run TypeScript E2E tests
        run: bun run test:e2e

  build:
    name: Build (${{ matrix.optimize }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        optimize: [ReleaseSafe, ReleaseFast]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Build
        run: zig build -Doptimize=${{ matrix.optimize }} -Dcpu=x86_64_v2
