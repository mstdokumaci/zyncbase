name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test (${{ matrix.optimize }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        optimize: [Debug, ReleaseSafe]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Run tests
        run: zig build test -Doptimize=${{ matrix.optimize }} --summary all

  test-sanitized:
    name: Test with ThreadSanitizer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Run tests with ThreadSanitizer
        run: zig build test -Dsanitize=thread --summary all
        continue-on-error: true
        env:
          TSAN_OPTIONS: second_deadlock_stack=1:history_size=7

  build:
    name: Build (${{ matrix.optimize }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        optimize: [ReleaseSafe, ReleaseFast]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Build
        run: zig build -Doptimize=${{ matrix.optimize }}
