name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Setup Zig
        uses: zig-build/zig-setup-action@v1
        with:
          version: 0.15.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install zlint
        run: |
          curl -fsSL -o /tmp/zlint \
            "https://github.com/DonIsaac/zlint/releases/download/v0.8.1/zlint-linux-x86_64"
          chmod +x /tmp/zlint
          sudo mv /tmp/zlint /usr/local/bin/zlint

      - name: Run lint
        run: bun run lint
