name: 'Setup ZyncBase Project'
description: 'Standard setup steps for ZyncBase project including Zig'

runs:
  using: "composite"
  steps:
    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: 0.15.2

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install OpenSSL (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: brew install openssl

    - name: Install OpenSSL (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y libssl-dev
